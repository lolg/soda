# Job statement formula: verb + object (noun) + contextual clarifier
#
# Write from the customer's perspective, not the company's.
#   BAD:  "maintain park facilities" (company perspective)
#   BAD:  "have a nice time at the park" (too vague, outcome embedded)
#   BAD:  "walk the dog" (too narrow — one step in the job)
#   GOOD: "enjoy outdoor recreation in a local public space"
#
# Test: Can and will the organisation address this job
# from beginning to end over time? If not, it's too broad.
# Does a competitor risk getting more of the job done on a
# single platform? If yes, it's too narrow.
