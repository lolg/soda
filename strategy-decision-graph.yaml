# ODI Strategy Selection — Decision Graph v0.4
#
# Slimmed from v0.3:
#   - Removed phase 1-2 condition nodes (classification computed in code)
#   - Removed present_both_paths routing stubs
#   - Merged similar strategy terminals (differentiated, sustaining, unresolved)
#
# What remains: 15 ask nodes + 9 strategy terminals = 24 nodes.
# The walker starts at the entry point for the segment's classification.
#
# Walked by an LLM agent with access to:
#   - segments.json (zone data, outcomes with descriptions, demographics)
#   - business-context.yaml (entity type, core JTBD, constraints, competitive context)
#
# Node types:
#   ask      — agent formulates a contextual question; human answers via CLI
#   strategy — resolved strategy with allocation emphasis and pricing direction
#
# Ask node responses: yes | no | uncertain
# "uncertain" always produces a safe fallback — never a dead end.
#
# Classification (MIXED | UNDER_ONLY | OVER_ONLY | WELL_SERVED) and
# weight override are computed deterministically in code before the
# graph walk begins. The walker enters the graph at the entry point
# corresponding to the classification result.

meta:
  version: "0.4"
  description: >
    Decision graph for per-segment strategy selection. Classification
    and weight override are computed in code. The graph handles phases
    3-5: WTP resolution, candidate ordering, execution qualification.
    Typically 1-3 questions per segment, 5 worst case.

# ─────────────────────────────────────────────
# Entry points — computed classification maps here
# ─────────────────────────────────────────────

entry_points:
  MIXED: mixed_wtp
  UNDER_ONLY: under_only_wtp
  OVER_ONLY: over_only_demand_check
  WELL_SERVED: well_served_discrete_check

# ─────────────────────────────────────────────
# Thresholds — used by code for classification
# ─────────────────────────────────────────────

thresholds:
  meaningful_underserved_breadth: 15     # % of outcomes in underserved zone
  meaningful_underserved_intensity: 15   # max opportunity score in zone
  meaningful_overserved_breadth: 20      # % of outcomes in overserved zone
  weight_dominance_ratio: 3.0           # zone weight ratio for override
  high_opportunity: 15                   # score threshold for "strong" signal
  improvement_bar: 20                    # % improvement needed to switch customers

# ─────────────────────────────────────────────
# Nodes
# ─────────────────────────────────────────────

nodes:

  # ── MIXED path ──────────────────────────────

  mixed_wtp:
    type: ask
    gate_intent: wtp
    purpose: >
      Determine whether this segment would pay a premium for better
      performance on the underserved outcomes — or whether the value
      proposition must include cost reduction.
    context_from:
      - underserved_outcomes
      - overserved_outcomes
      - demographics
      - company_metadata
    on_yes: mixed_improvement_check
    on_no: mixed_cost_check_for_dominant
    on_uncertain: strategy_unresolved

  mixed_improvement_check:
    type: ask
    gate_intent: improvement_capability
    purpose: >
      Can the team deliver meaningful improvement (≥20% better) on the
      top underserved outcomes? Focus on the highest-scoring outcomes
      specifically — not improvement in general.
    context_from:
      - underserved_outcomes
      - company_metadata
    on_yes: strategy_differentiated
    on_no: strategy_sustaining
    on_uncertain: strategy_sustaining

  mixed_cost_check_for_dominant:
    type: ask
    gate_intent: cost_reduction_capability
    purpose: >
      This segment has overserved outcomes where current investment
      exceeds what customers value. Can resources be freed by stripping
      or simplifying these low-priority outcomes? This establishes the
      budget lever before asking about improvement.
    context_from:
      - overserved_outcomes
      - company_metadata
    on_yes: mixed_improvement_for_dominant
    on_no: mixed_disruption_demand
    on_uncertain: mixed_disruption_demand

  mixed_improvement_for_dominant:
    type: ask
    gate_intent: improvement_capability
    purpose: >
      Cost reduction has already been confirmed — do not re-ask about
      stripping or reallocating from low-priority outcomes. Focus only
      on improvement capability: with freed resources available, can the
      team deliver meaningful improvement (≥20% better) on the top
      underserved outcomes?
    context_from:
      - underserved_outcomes
      - company_metadata
    on_yes: strategy_dominant
    on_no: mixed_disruption_demand
    on_uncertain: mixed_disruption_demand

  mixed_disruption_demand:
    type: ask
    gate_intent: disruption_demand
    purpose: >
      Higher strategies have not qualified. Is there a confirmed
      population of overserved customers (or nonconsumers) who would
      accept a simpler, cheaper solution — even if it doesn't perform
      as well on some dimensions?
    context_from:
      - overserved_outcomes
      - demographics
      - company_metadata
    on_yes: mixed_disruption_supply
    on_no: strategy_sustaining
    on_uncertain: strategy_sustaining

  mixed_disruption_supply:
    type: ask
    gate_intent: disruption_supply
    purpose: >
      Demand exists for a cheaper solution. Can the team profitably
      deliver a lower-cost structure by stripping or simplifying the
      overserved outcomes?
    context_from:
      - overserved_outcomes
      - company_metadata
    on_yes: strategy_disruptive_mixed
    on_no: strategy_sustaining
    on_uncertain: strategy_sustaining

  # ── UNDER_ONLY path ─────────────────────────

  under_only_wtp:
    type: ask
    gate_intent: wtp
    purpose: >
      This segment is underserved with no meaningful overserved signal.
      Would they pay more for a solution that addresses the top unmet
      outcomes — or do they expect better at the same or lower price?
    context_from:
      - underserved_outcomes
      - demographics
      - company_metadata
    on_yes: under_only_improvement_check
    on_no: under_only_improvement_for_dominant
    on_uncertain: strategy_unresolved

  under_only_improvement_check:
    type: ask
    gate_intent: improvement_capability
    purpose: >
      Can the team deliver ≥20% improvement on the top underserved
      outcomes? There are no overserved outcomes to strip — improvement
      must stand on its own.
    context_from:
      - underserved_outcomes
      - company_metadata
    on_yes: strategy_differentiated
    on_no: strategy_sustaining
    on_uncertain: strategy_sustaining

  under_only_improvement_for_dominant:
    type: ask
    gate_intent: improvement_capability
    purpose: >
      Can the team deliver ≥20% improvement on the top underserved
      outcomes?
    context_from:
      - underserved_outcomes
      - company_metadata
    on_yes: under_only_efficiency_check
    on_no: under_only_nonconsumer_check
    on_uncertain: under_only_nonconsumer_check

  under_only_efficiency_check:
    type: ask
    gate_intent: cost_reduction_without_stripping
    purpose: >
      No overserved outcomes to strip. Can cost reduction come from
      operational efficiency, technology advantage, or business model
      innovation — while also delivering the improvement?
    context_from:
      - company_metadata
    on_yes: strategy_dominant_candidate
    on_no: under_only_nonconsumer_check
    on_uncertain: under_only_nonconsumer_check

  under_only_nonconsumer_check:
    type: ask
    gate_intent: nonconsumption
    purpose: >
      Is there a population of nonconsumers — people priced out of or
      unable to access existing solutions — who would accept a simpler
      solution at lower cost?
    context_from:
      - demographics
      - company_metadata
    on_yes: strategy_disruptive_nonconsumer
    on_no: strategy_sustaining
    on_uncertain: strategy_sustaining

  # ── OVER_ONLY path ──────────────────────────

  over_only_demand_check:
    type: ask
    gate_intent: disruption_demand
    purpose: >
      This segment is overserved — they're getting more than they need.
      Is there a confirmed population (or nonconsumers) who would switch
      to a simpler, cheaper solution even if it doesn't perform as well
      on some dimensions?
    context_from:
      - overserved_outcomes
      - demographics
      - company_metadata
    on_yes: over_only_supply_check
    on_no: over_only_discrete_check
    on_uncertain: over_only_discrete_check

  over_only_supply_check:
    type: ask
    gate_intent: disruption_supply
    purpose: >
      Demand exists for a cheaper solution. Can the team profitably
      deliver a lower-cost structure by stripping or simplifying the
      overserved outcomes?
    context_from:
      - overserved_outcomes
      - company_metadata
    on_yes: strategy_disruptive
    on_no: over_only_discrete_check
    on_uncertain: over_only_discrete_check

  over_only_discrete_check:
    type: ask
    gate_intent: restricted_customers
    purpose: >
      Are customers in this segment restricted — legally, physically,
      situationally — in their alternatives? This cannot be inferred
      from zone data.
    context_from:
      - demographics
      - company_metadata
    on_yes: strategy_discrete
    on_no: strategy_sustaining
    on_uncertain: strategy_sustaining

  # ── WELL_SERVED path ────────────────────────

  well_served_discrete_check:
    type: ask
    gate_intent: restricted_customers
    purpose: >
      No meaningful underserved or overserved signal. Is there a
      restricted-access situation that would support a discrete strategy?
    context_from:
      - demographics
      - company_metadata
    on_yes: strategy_discrete
    on_no: strategy_sustaining
    on_uncertain: strategy_sustaining

  # ── STRATEGY TERMINALS ──────────────────────
  #
  # 9 terminals. Classification is carried from the code layer —
  # the report step uses it to vary allocation wording where needed
  # (e.g. overserved: "strip" vs "n/a" based on classification).

  strategy_differentiated:
    type: strategy
    label: differentiated
    classification: from_context
    allocation:
      underserved: invest — priority order by opportunity score
      overserved: strip for margin if present, otherwise n/a
      table_stakes: maintain at competitive floor
      appropriate: deprioritise
    pricing_direction: premium
    stop_doing: >
      Stop competing on price. Stop investing in overserved outcomes
      beyond minimum credibility. Focus entirely on delivering ≥20%
      improvement on the top underserved outcomes.

  strategy_dominant:
    type: strategy
    label: dominant
    classification: MIXED
    allocation:
      underserved: invest — priority order by opportunity score
      overserved: strip or simplify to fund improvement
      table_stakes: maintain at competitive floor
      appropriate: eliminate where possible
    pricing_direction: hold or reduce — savings fund improvement first; pass to customer only if structural cost advantage exists
    stop_doing: >
      Stop doing anything that doesn't serve one of the two levers:
      improvement on underserved outcomes or cost reduction on overserved
      ones. Every feature decision must pass this test.
    note: >
      Dominant means better outcomes at no higher cost. The cost savings
      from stripping overserved outcomes may fund the improvement (same
      price, better product) or may also enable a price reduction if the
      savings exceed what improvement requires. Do not assume price
      reduction — the default is reallocation.

  strategy_dominant_candidate:
    type: strategy
    label: dominant (candidate)
    classification: UNDER_ONLY
    allocation:
      underserved: invest — priority order by opportunity score
      overserved: n/a
      table_stakes: maintain at competitive floor; look for efficiency
      appropriate: eliminate where possible
    pricing_direction: hold or reduce — no overserved outcomes to strip; cost reduction requires structural efficiency gains
    stop_doing: >
      Stop anything that doesn't serve improvement or operational
      efficiency. Cost reduction must come from how the product is
      built and delivered, not from stripping features.
    note: >
      No overserved outcomes to strip. Cost reduction must come from
      operational efficiency, technology advantage, or business model
      innovation. Flag as a candidate requiring additional validation.

  strategy_disruptive:
    type: strategy
    label: disruptive
    classification: OVER_ONLY
    allocation:
      underserved: n/a
      overserved: strip or dramatically simplify
      table_stakes: maintain minimum viable subset only
      appropriate: eliminate
    pricing_direction: reduce significantly
    stop_doing: >
      Stop adding performance the target does not value. Resist the
      feature instinct. Focus on making it cheaper, simpler, and good
      enough for the overserved population.
    trajectory: >
      Flag which underserved outcomes (if any, in adjacent segments or
      future data) represent the path toward a dominant position.

  strategy_disruptive_mixed:
    type: strategy
    label: disruptive
    classification: MIXED
    allocation:
      underserved: not addressed in this strategy — revisit if capability changes
      overserved: strip or dramatically simplify
      table_stakes: maintain minimum viable subset only
      appropriate: eliminate
    pricing_direction: reduce significantly
    stop_doing: >
      Stop adding performance the target does not value. Focus on cost
      reduction via stripping overserved outcomes and simplifying delivery.
    trajectory: >
      The underserved outcomes remain real opportunities. If capability
      changes (new technology, funding, partnership), revisit for
      a dominant strategy.

  strategy_disruptive_nonconsumer:
    type: strategy
    label: disruptive
    classification: UNDER_ONLY
    allocation:
      underserved: address partially — enough for nonconsumer adoption
      overserved: n/a
      table_stakes: minimal — nonconsumers have lower expectations
      appropriate: ignore
    pricing_direction: reduce significantly
    stop_doing: >
      Stop targeting current consumers with incremental improvements.
      The opportunity is in the population that can't access or afford
      existing solutions.
    note: >
      Requires confirmed nonconsumption — does not follow from zone
      data alone.

  strategy_discrete:
    type: strategy
    label: discrete
    classification: any
    allocation:
      underserved: not required
      overserved: not required
      table_stakes: maintain minimum acceptable
      appropriate: ignore
    pricing_direction: premium (captive context)
    stop_doing: >
      Do not over-invest in quality. The premium is justified by access
      and restriction, not by performance.
    note: >
      Discrete is always a situational overlay. Cannot be derived from
      zone data.

  strategy_sustaining:
    type: strategy
    label: sustaining
    classification: any
    allocation:
      underserved: modest incremental improvement on highest-scoring if present
      overserved: modest cost reduction if easy wins exist
      table_stakes: maintain — primary competitive battleground
      appropriate: hold
    pricing_direction: hold
    stop_doing: >
      Stop searching for a breakthrough. Protect the floor and move
      incrementally. Focus on table stakes parity with competitors.
    note: >
      For incumbents, sustaining is a valid defensive strategy — existing
      customers face switching costs and will stay for modest improvements.
      For new entrants, this is a strategic warning: a product that is only
      slightly better or cheaper cannot overcome switching costs. Reconsider
      the market scope, job definition, or target segment. For adjacent
      entrants, assess whether existing brand and customer relationships
      lower the switching barrier enough to make incremental entry viable.

  strategy_unresolved:
    type: strategy
    label: null
    classification: from_context
    allocation:
      underserved: invest (priority order) — emphasis depends on WTP resolution
      overserved: reduce if present — for margin (WTP yes) or price (WTP no)
      table_stakes: maintain at competitive floor
      appropriate: deprioritise
    pricing_direction: unresolved
    note: >
      WTP could not be determined. The allocation map is valid regardless
      — the outcomes to invest in and strip are the same. But the pricing
      direction and label depend on resolving WTP:
      - If WTP confirmed → Differentiated
      - If WTP denied → Dominant (or Dominant candidate if UNDER_ONLY)
    open_dependencies:
      - wtp
